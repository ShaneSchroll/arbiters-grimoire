<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Deck Builder &middot; The Oracle</title>
        <link rel="icon" type="image/svg+xml" href="/static/dist/favicon.svg" />
        <link rel="stylesheet" href="/static/dist/styles-dist.css" />
        <link rel="stylesheet" href="/static/dist/deckbuilder-dist.css" />
        <script src="/static/dist/app-dist.js" defer></script>
        <script src="/static/dist/deckbuilder-dist.js" defer></script>
    </head>

    <body>
        <header>
            <a class="logo-link" href="/">
                <img src="/static/dist/favicon.svg" alt="MTG Oracle" />
                <h1>The <span>Oracle</span></h1>
            </a>

            <button id="account-toggle" class="account-toggle" type="button"
                aria-expanded="false" aria-controls="account-menu">Menu</button>

            <div id="account-menu" class="account-menu">
                <a class="tips-link" href="/">Oracle</a>
                <a class="rules-link" href="/pages/tips">Oracles Insight</a>
                <a class="rules-link" href="/pages/rules">Rules</a>

                <select id="model" title="Choose the underlying model">
                    <option value="claude-sonnet-4-6">Sonnet 4.6 &middot; Fast</option>
                    <option value="claude-opus-4-7">Opus 4.7 &middot; Max</option>
                </select>

                <span id="who" title="Signed in as"></span>
                <button id="logout" class="logout" type="button">Log out</button>
            </div>
        </header>

        <div id="db">
            <div class="wrap db-grid">
                <div class="db-field">
                    <label for="decklist">Your decklist — one card per line (e.g. <code>3 Lightning Bolt</code>). Edit it any time; tweaks are picked up on your next message.</label>
                    <textarea id="decklist" spellcheck="false"
                        placeholder="4 Lightning Bolt&#10;2 Snapcaster Mage&#10;1 Counterspell&#10;…"></textarea>
                </div>

                <div class="db-row">
                    <div class="db-field">
                        <label for="format">Format</label>
                        <select id="format">
                            <option value="">Unspecified</option>
                            <option>Commander</option>
                            <option>Standard</option>
                            <option>Pioneer</option>
                            <option>Modern</option>
                            <option>Legacy</option>
                            <option>Pauper</option>
                            <option>Vintage</option>
                        </select>
                    </div>
                    <div class="db-field">
                        <label for="notes">Goal (optional)</label>
                        <input id="notes" type="text"
                            placeholder="e.g. aggressive mono-red, lower the curve, more card draw" />
                    </div>
                </div>

                <div class="db-actions">
                    <button id="build" class="db-build" type="button">Finish My Deck</button>
                    <span class="db-hint">Starts a fresh analysis. Use the follow-up box below to refine it.</span>
                </div>

                <div id="transcript"></div>

                <div class="db-followup" id="followup-row">
                    <textarea id="followup" rows="1"
                        placeholder="Refine it — e.g. “make it more aggressive”, “cut to 60 cards”, “add more removal”…"></textarea>
                    <button class="send" id="followup-send" type="button">Send</button>
                </div>
            </div>
        </div>

        <div class="disclosure">
            <p>This site is not affiliated with, endorsed by, or sponsored by Wizards of the Coast &trade;.</p>
            <p>Designed and Developed by Shane Schroll</p>
        </div>
    </body>
</html>
