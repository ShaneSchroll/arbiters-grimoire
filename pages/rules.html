<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width" />
        <title>The Oracle &middot; Rules</title>
        <link rel="icon" type="image/svg+xml" href="/static/dist/favicon.svg" />
        <link rel="stylesheet" href="/static/dist/styles-dist.css" />
        <script src="/static/dist/app-dist.js" defer></script>
        <script src="/static/dist/rules-dist.js" defer></script>
    </head>

    <body>
        <header>
            <a class="logo-link" href="/">
                <img src="/static/dist/favicon.svg" alt="Magic The Gathering Oracle" />
                <h1>The <span>Oracle</span></h1>
            </a>

            <button
                id="account-toggle"
                class="account-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="account-menu">
                Menu
            </button>

            <div id="account-menu" class="account-menu">
                <a class="tips-link" href="/pages/tips">Oracles Insight</a>
                <a class="rules-link" href="/pages/rules">Rules</a>
                <a class="rules-link" href="/deckbuilder">Deck Builder</a>

                <select id="model" title="Choose the underlying model">
                    <option value="claude-sonnet-4-6">Sonnet 4.6 &middot; Fast</option>
                    <option value="claude-opus-4-7">Opus 4.7 &middot; Max</option>
                </select>

                <span id="who" title="Signed in as"></span>
                <button id="logout" class="logout" type="button">Log out</button>
            </div>
        </header>

        <div class="docs-layout">
            <!-- Mobile-only drawer trigger. Hidden on desktop -->
            <button
                id="docs-sidebar-toggle"
                class="docs-sidebar-toggle"
                type="button"
                aria-label="Open rules navigation"
                aria-expanded="false"
                aria-controls="docs-sidebar">
                <span class="docs-toggle-icon" aria-hidden="true">☰</span>
                <span class="docs-toggle-label">Rules</span>
            </button>

            <!-- Backdrop shown only when the mobile drawer is open. -->
            <div id="docs-backdrop" class="docs-backdrop" aria-hidden="true"></div>

            <aside id="docs-sidebar" class="docs-sidebar" aria-label="Rules navigation">
                <div class="docs-search-wrap">
                    <input
                        id="docs-search"
                        class="docs-search"
                        type="search"
                        placeholder="Search rules…"
                        autocomplete="off"
                        spellcheck="false" />
                </div>
                <nav id="docs-toc" class="docs-toc" aria-label="Table of contents">
                    <div class="docs-loading">Loading rules…</div>
                </nav>
            </aside>

            <main class="docs-main" id="docs-main">
                <div class="docs-content" id="docs-content">
                    <div class="docs-loading">Loading rules…</div>
                </div>
            </main>
        </div>
    </body>
</html>
