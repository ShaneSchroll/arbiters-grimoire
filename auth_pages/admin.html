<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Admin &middot; The Oracle</title>
        <link rel="icon" type="image/svg+xml" href="/static/dist/favicon.svg" />
        <link rel="stylesheet" href="/static/dist/admin-dist.css" />
    </head>

    <body>
        <header>
            <h1>The <span>Oracle</span> &middot; Admin</h1>
            <a href="/">&larr; Back to chat</a>
            <span class="spacer"></span>
            <span class="default-budget" id="default-budget"></span>
            <button id="refresh" type="button">Refresh</button>
        </header>

        <div class="msg" id="msg"></div>

        <div class="toolbar">
            <button class="primary" id="new-user-btn" type="button">+ New user</button>
            <input type="search" id="filter" placeholder="Filter by email…" />
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Status</th>
                        <th>Admin</th>
                        <th>Opus</th>
                        <th>Spent today</th>
                        <th>Daily budget</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="rows">
                    <tr><td colspan="7" class="loading">Loading…</td></tr>
                </tbody>
            </table>
        </div>

        <!-- New-user dialog -->
        <dialog id="create-dialog">
            <h3>Create user</h3>
            <div class="field">
                <label for="new-email">Email</label>
                <input type="email" id="new-email" autocomplete="off" />
            </div>
            <div class="checks">
                <label><input type="checkbox" id="new-approved" checked /> Approved</label>
                <label><input type="checkbox" id="new-admin" /> Admin</label>
                <label><input type="checkbox" id="new-opus" /> Opus access</label>
            </div>
            <p class="default-budget" style="margin:10px 0;">
                A single-use link will be generated for them to set their password.
            </p>
            <div class="actions">
                <button id="create-cancel" type="button">Cancel</button>
                <button class="primary" id="create-go" type="button">Create</button>
            </div>
        </dialog>

        <!-- Budget dialog -->
        <dialog id="budget-dialog">
            <h3>Set daily budget</h3>
            <p class="default-budget" id="budget-for" style="margin-bottom:12px;"></p>
            <div class="field">
                <label><input type="radio" name="bmode" value="usd" checked /> Fixed cap (USD/day)</label>
                <input type="number" id="budget-usd" min="0" step="0.25" value="1.00" />
            </div>
            <div class="checks" style="flex-direction:column; gap:8px;">
                <label><input type="radio" name="bmode" value="default" /> Use global default</label>
                <label><input type="radio" name="bmode" value="unlimited" /> Unlimited</label>
            </div>
            <div class="actions">
                <button id="budget-cancel" type="button">Cancel</button>
                <button class="primary" id="budget-go" type="button">Save</button>
            </div>
        </dialog>

        <script>
            const rowsEl = document.getElementById("rows");
            const msgEl = document.getElementById("msg");
            const filterEl = document.getElementById("filter");
            const defaultBudgetEl = document.getElementById("default-budget");
            let USERS = [];
            let DEFAULT_BUDGET = null;

            function showMsg(text, kind, linkUrl) {
                msgEl.className = "msg show " + (kind || "ok");
                msgEl.textContent = text;
                if (linkUrl) {
                    const a = document.createElement("a");
                    a.className = "link";
                    a.href = linkUrl;
                    a.textContent = linkUrl;
                    msgEl.appendChild(a);
                }
                if (kind !== "error" && !linkUrl) {
                    setTimeout(() => msgEl.classList.remove("show"), 3500);
                }
            }

            function esc(s) {
                return String(s).replace(/[&<>"]/g, c =>
                    ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
            }

            async function api(path, body) {
                const res = await fetch(path, {
                    method: body ? "POST" : "GET",
                    headers: body ? { "Content-Type": "application/json" } : undefined,
                    body: body ? JSON.stringify(body) : undefined,
                });
                if (res.status === 401) { window.location.href = "/login"; return null; }
                if (res.status === 403) { window.location.href = "/"; return null; }
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.detail || ("Request failed: " + res.status));
                return data;
            }

            async function load() {
                try {
                    const data = await api("/api/admin/users");
                    if (!data) return;
                    USERS = data.users;
                    DEFAULT_BUDGET = data.default_budget_usd;
                    defaultBudgetEl.textContent =
                        "Global default budget: $" + Number(DEFAULT_BUDGET).toFixed(2) + "/day";
                    render();
                } catch (e) {
                    showMsg(e.message, "error");
                }
            }

            function budgetLabel(u) {
                if (u.budget_unlimited) return "unlimited";
                if (u.budget_is_default)
                    return "default ($" + Number(DEFAULT_BUDGET).toFixed(2) + ")";
                return "$" + Number(u.budget_usd).toFixed(2);
            }

            function render() {
                const q = filterEl.value.trim().toLowerCase();
                const list = USERS.filter(u => !q || u.email.toLowerCase().includes(q));
                if (!list.length) {
                    rowsEl.innerHTML = '<tr><td colspan="7" class="loading">No users.</td></tr>';
                    return;
                }
                rowsEl.innerHTML = list.map(u => {
                    const opus = u.is_admin
                        ? '<span class="pill on">admin</span>'
                        : (u.opus_allowed
                            ? '<span class="pill on">yes</span>'
                            : '<span class="pill off">no</span>');
                    const status = u.approved
                        ? '<span class="pill on">approved</span>'
                        : '<span class="pill">pending</span>';
                    const e = esc(u.email);
                    return `<tr class="${u.approved ? "" : "pending"}">
                        <td class="email">${e}<div class="sub">${esc(u.created_at.slice(0,10))}</div></td>
                        <td>${status}</td>
                        <td><span class="pill ${u.is_admin ? "on":"off"}">${u.is_admin ? "yes":"no"}</span></td>
                        <td>${opus}</td>
                        <td class="spend">$${Number(u.spent_usd).toFixed(4)}</td>
                        <td class="budget">${budgetLabel(u)}</td>
                        <td><div class="row-actions">
                            <button data-act="approve" data-email="${e}">${u.approved ? "Revoke":"Approve"}</button>
                            <button data-act="admin" data-email="${e}">${u.is_admin ? "Remove admin":"Make admin"}</button>
                            <button data-act="opus" data-email="${e}"${u.is_admin ? " disabled":""}>${u.opus_allowed ? "Opus off":"Opus on"}</button>
                            <button data-act="budget" data-email="${e}">Budget</button>
                            <button data-act="reset" data-email="${e}">Reset link</button>
                            <button class="danger" data-act="delete" data-email="${e}">Delete</button>
                        </div></td>
                    </tr>`;
                }).join("");
            }

            function findUser(email) { return USERS.find(u => u.email === email); }

            rowsEl.addEventListener("click", async (ev) => {
                const btn = ev.target.closest("button[data-act]");
                if (!btn) return;
                const email = btn.dataset.email;
                const act = btn.dataset.act;
                const u = findUser(email);
                try {
                    if (act === "approve") {
                        await api("/api/admin/approve", { email, approved: !u.approved });
                        showMsg((u.approved ? "Revoked " : "Approved ") + email);
                        await load();
                    } else if (act === "admin") {
                        await api("/api/admin/admin", { email, is_admin: !u.is_admin });
                        showMsg("Updated admin for " + email);
                        await load();
                    } else if (act === "opus") {
                        await api("/api/admin/opus", { email, opus_allowed: !u.opus_allowed });
                        showMsg("Updated Opus access for " + email);
                        await load();
                    } else if (act === "reset") {
                        const r = await api("/api/admin/reset-link", { email });
                        showMsg("Single-use reset link for " + email + " (valid 24h):", "ok", r.reset_url);
                    } else if (act === "budget") {
                        openBudget(u);
                    } else if (act === "delete") {
                        if (!confirm("Delete " + email + "? This cannot be undone.")) return;
                        await api("/api/admin/delete", { email });
                        showMsg("Deleted " + email);
                        await load();
                    }
                } catch (e) {
                    showMsg(e.message, "error");
                }
            });

            // ----- create dialog -----
            const createDlg = document.getElementById("create-dialog");
            document.getElementById("new-user-btn").onclick = () => {
                document.getElementById("new-email").value = "";
                document.getElementById("new-approved").checked = true;
                document.getElementById("new-admin").checked = false;
                document.getElementById("new-opus").checked = false;
                createDlg.showModal();
            };
            document.getElementById("create-cancel").onclick = () => createDlg.close();
            document.getElementById("create-go").onclick = async () => {
                const email = document.getElementById("new-email").value.trim();
                if (!email) return;
                try {
                    const r = await api("/api/admin/create", {
                        email,
                        approved: document.getElementById("new-approved").checked,
                        is_admin: document.getElementById("new-admin").checked,
                        opus_allowed: document.getElementById("new-opus").checked,
                    });
                    createDlg.close();
                    showMsg("Created " + email + ". Send them this link to set a password (valid 24h):", "ok", r.reset_url);
                    await load();
                } catch (e) {
                    showMsg(e.message, "error");
                }
            };

            // ----- budget dialog -----
            const budgetDlg = document.getElementById("budget-dialog");
            let budgetTarget = null;
            function openBudget(u) {
                budgetTarget = u.email;
                document.getElementById("budget-for").textContent = "For " + u.email;
                document.querySelector('input[name="bmode"][value="usd"]').checked = true;
                document.getElementById("budget-usd").value =
                    u.budget_unlimited || u.budget_is_default ? "1.00" : Number(u.budget_usd).toFixed(2);
                budgetDlg.showModal();
            }
            document.getElementById("budget-cancel").onclick = () => budgetDlg.close();
            document.getElementById("budget-go").onclick = async () => {
                const mode = document.querySelector('input[name="bmode"]:checked').value;
                const payload = { email: budgetTarget, mode };
                if (mode === "usd") payload.usd = parseFloat(document.getElementById("budget-usd").value);
                try {
                    await api("/api/admin/budget", payload);
                    budgetDlg.close();
                    showMsg("Updated budget for " + budgetTarget);
                    await load();
                } catch (e) {
                    showMsg(e.message, "error");
                }
            };

            filterEl.addEventListener("input", render);
            document.getElementById("refresh").onclick = load;
            load();
        </script>
    </body>
</html>
