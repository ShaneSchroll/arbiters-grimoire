<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Reset password &middot; The Oracle</title>
        <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
        <link rel="stylesheet" href="/static/styles.css" />
    </head>

    <body class="auth-page">
        <div class="card">
            <h1>The <span>Oracle</span></h1>
            <p class="sub">Choose a new password. Reset links are single use and expire after 24 hours.</p>

            <form id="form">
                <label for="password">New password</label>
                <input id="password" type="password" autocomplete="new-password" minlength="12" required />
                <div class="hint">Minimum 12 characters.</div>

                <label for="confirm">Confirm new password</label>
                <input id="confirm" type="password" autocomplete="new-password" minlength="12" required />

                <button id="submit" type="submit">Update password</button>
                <div class="msg" id="msg"></div>
            </form>

            <div class="links">
                <a href="/login">Back to sign in</a>
            </div>
        </div>

        <script>
            const form = document.getElementById("form");
            const msg = document.getElementById("msg");
            const submit = document.getElementById("submit");
            const token = new URLSearchParams(window.location.search).get("token") || "";

            if (!token) {
                msg.className = "msg error";
                msg.textContent = "Missing reset token. Ask the administrator for a new link.";
                submit.disabled = true;
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                msg.className = "msg";
                msg.textContent = "";

                const password = document.getElementById("password").value;
                const confirm = document.getElementById("confirm").value;

                if (password !== confirm) {
                    msg.className = "msg error";
                    msg.textContent = "Passwords do not match.";
                    return;
                }

                submit.disabled = true;

                try {
                    const res = await fetch("/api/auth/reset", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ token, new_password: password }),
                    });

                    const data = await res.json().catch(() => ({}));

                    if (res.ok) {
                        msg.className = "msg ok";
                        msg.textContent = (data.message || "Password updated.") + " Redirecting to sign in...";
                        setTimeout(() => { window.location.href = "/login"; }, 1500);
                    } else {
                        msg.className = "msg error";
                        msg.textContent = data.detail || "Reset failed.";
                        submit.disabled = false;
                    }
                } catch {
                    msg.className = "msg error";
                    msg.textContent = "Could not reach the server.";
                    submit.disabled = false;
                }
            });
        </script>
    </body>
</html>
