<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sign in &middot; The Oracle</title>
        <link rel="icon" type="image/svg+xml" href="/static/dist/favicon.svg" />
        <link rel="stylesheet" href="/static/dist/styles-dist.css" />
    </head>

    <body class="auth-page">
        <div class="card">
            <h1>The <span>Oracle</span></h1>
            <p class="sub">Sign in to your account.</p>

            <form id="form">
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="email" required />

                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" required />

                <button id="submit" type="submit">Sign in</button>
                <div class="msg" id="msg"></div>
            </form>

            <div class="links">
                <a href="/register">Create account</a>
            </div>
        </div>

        <script>
            const form = document.getElementById("form");
            const msg = document.getElementById("msg");
            const submit = document.getElementById("submit");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                msg.className = "msg";
                msg.textContent = "";
                submit.disabled = true;

                try {
                    const res = await fetch("/api/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            email: document.getElementById("email").value,
                            password: document.getElementById("password").value,
                        }),
                    });

                    if (res.ok) {
                        window.location.href = "/";
                        return;
                    }

                    const data = await res.json().catch(() => ({}));
                    msg.className = "msg error";
                    msg.textContent = data.detail || "Sign in failed.";
                } catch {
                    msg.className = "msg error";
                    msg.textContent = "Could not reach the server.";
                } finally {
                    submit.disabled = false;
                }
            });
        </script>
    </body>
</html>
