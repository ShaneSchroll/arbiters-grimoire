<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width" />
        <title>The MTG Oracle</title>
        <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
        <link rel="stylesheet" href="/static/styles-dist.css" />
        <script src="/static/app-dist.js" defer></script>
    </head>

    <body>
        <header>
            <div class="mana">
                <i class="mw"></i>
                <i class="mu"></i>
                <i class="mb"></i>
                <i class="mr"></i>
                <i class="mg"></i>
            </div>

            <h1>The <span>Oracle</span></h1>

            <button
                id="account-toggle"
                class="account-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="account-menu">
                Account
            </button>

            <div id="account-menu" class="account-menu">
                <a
                    class="rulebook-link"
                    href="https://magic.wizards.com/en/rules"
                    target="_blank"
                    rel="noopener noreferrer">
                    Rulebook
                </a>

                <select id="model" title="Choose the underlying model">
                    <option value="claude-sonnet-4-6">Sonnet 4.6 &middot; Fast</option>
                    <option value="claude-opus-4-7">Opus 4.7 &middot; Max</option>
                </select>

                <span id="who" title="Signed in as"></span>
                <button id="logout" class="logout" type="button">Log out</button>
            </div>
        </header>

        <div id="chat">
            <div class="wrap" id="messages">
                <div class="empty" id="empty">
                    <h2>Ask a Magic: The Gathering rules question.</h2>
                    <p>Answers are grounded in the official Magic: The Gathering Rulebook.</p>

                    <div class="examples">
                        <button>If I cast Lightning Bolt at a creature, can my opponent respond?</button>
                        <button>How do first strike and deathtouch interact in combat?</button>
                        <button>Explain the layer system for continuous effects.</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="wrap">
                <div class="inputrow">
                    <textarea id="input" rows="1"
                    placeholder="Ask a rules question…"></textarea>
                    <button class="send" id="send">Fact or Fiction</button>
                </div>
            </div>
        </footer>

        <div class="disclosure">
            <p>This site is not affiliated with, endorsed by, or sponsored by Wizards of the Coast &trade;.</p>
        </div>
    </body>
</html>
