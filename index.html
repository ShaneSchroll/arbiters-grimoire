<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width" />
        <title>The Oracle</title>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

            :root {
                --bg: #0f1014;
                --panel: #181a21;
                --panel-2: #1f222b;
                --line: #2c2f3a;
                --text: #e7e8ec;
                --muted: #9a9db0;
                --accent: #c8a24a;
                --user: #2a3346;
                --w:#e9e3c8;
                --u:#4a78c8;
                --b:#6b6678;
                --r:#d05a4e;
                --g:#4ea36a;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: "Inter", sans-serif;
            }

            body {
                background: var(--bg); 
                color: var(--text);
                font: 15px/1.6 "Inter", sans-serif;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            header {
                padding: 14px 22px;
                background: var(--panel);
                border-bottom: 1px solid var(--line);
                display: flex;
                align-items: center;
                gap: 16px;
            }

            header .mana {
                display: flex;
                gap: 4px;
            }

            header .mana i {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                display: block;
            }

            .mw { background: var(--w); }
            .mu { background: var(--u); }
            .mb { background: var(--b); }
            .mr { background: var(--r); }
            .mg { background: var(--g); }

            h1 {
                font-size: 17px;
                font-weight: 600;
                letter-spacing: .3px;
                flex: 1;
            }

            h1 span { color: var(--accent); }

            select {
                background: var(--panel-2);
                color: var(--text);
                border: 1px solid var(--line);
                border-radius: 7px;
                padding: 7px 10px;
                font-size: 14px;
            }

            #chat {
                flex: 1;
                overflow-y: auto;
                padding: 26px 0;
            }

            .wrap {
                max-width: 780px;
                margin: 0 auto;
                padding: 0 22px;
            }

            .msg {
                margin-bottom: 22px;
                display: flex;
            }

            .msg.user {
                justify-content: flex-end;
            }

            .bubble {
                padding: 13px 16px;
                border-radius: 12px;
                max-width: 88%;
                white-space: pre-wrap;
                word-wrap: break-word;
            }

            .user .bubble {
                background: var(--user);
                border-bottom-right-radius: 3px;
            }

            .bot .bubble {
                background: var(--panel);
                border: 1px solid var(--line);
                border-bottom-left-radius: 3px;
            }

            .bot .bubble code {
                background: var(--panel-2);
                padding: 1px 5px;
                border-radius: 4px;
                font-size: 13px;
            }

            .rule {
                color: var(--accent);
                font-weight: 600;
                background: rgba(200,162,74,.1);
                padding: 0 4px;
                border-radius: 4px;
            }

            .sources {
                margin-top: 10px;
                font-size: 12.5px;
            }

            .sources summary {
                color: var(--muted);
                cursor: pointer;
                user-select: none;
            }

            .chip {
                display: inline-block;
                margin: 6px 6px 0 0;
                padding: 5px 9px;
                background: var(--panel-2);
                border: 1px solid var(--line);
                border-radius: 6px;
                color: var(--muted);
            }

            .chip b {
                color: var(--accent);
            }

            .empty {
                text-align: center;
                color: var(--muted);
                margin-top: 14vh;
            }

            .empty h2 {
                font-weight: 500;
                color: var(--text);
                margin-bottom: 6px;
            }

            .examples {
                margin-top: 20px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .examples button {
                background: var(--panel);
                border: 1px solid var(--line);
                color: var(--text);
                padding: 10px 14px;
                border-radius: 9px;
                cursor: pointer;
                font-size: 14px;
                text-align: left;
            }

            .examples button:hover {
                border-color: var(--accent);
            }

            footer {
                border-top: 1px solid var(--line);
                background: var(--panel);
                padding: 14px 0;
            }

            .inputrow {
                display: flex;
                gap: 14px;
            }

            textarea {
                flex: 1;
                resize: none;
                background: var(--panel-2);
                color: var(--text);
                border: 1px solid var(--line);
                border-radius: 9px;
                padding: 9px 13px;
                font: inherit;
                max-height: 140px;
            }

            textarea:focus {
                outline: 1px solid var(--accent);
            }

            button.send {
                background: var(--accent);
                color: #1a1407;
                border: none;
                border-radius: 9px;
                padding: 0 45px;
                cursor: pointer;
                font-weight: 700;
                font-size: 14px;
            }

            button.send:disabled {
                opacity: .5;
                cursor: default;
            }

            .dots span {
                display: inline-block;
                width: 6px;
                height: 6px;
                margin: 0 2px;
                background: var(--muted);
                border-radius: 50%;
                animation: b 1.2s infinite ease-in-out;
            }

            .dots span:nth-child(2) {
                animation-delay:.2s;
            }

            .dots span:nth-child(3) {
                animation-delay:.4s;
            }

            @keyframes b { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

            .rulebook-link {
                background: rgb(74, 120, 200);
                color: var(--text);
                border: 1px solid var(--line);
                border-radius: 7px;
                padding: 5px 10px;
                font-size: 14px;
                text-decoration: none;
            }
        </style>
    </head>

    <body>
        <header>
            <div class="mana">
                <i class="mw"></i>
                <i class="mu"></i>
                <i class="mb"></i>
                <i class="mr"></i>
                <i class="mg"></i>
            </div>

            <h1>The <span>Oracle</span></h1>

            <a class="rulebook-link" href="magic-comprehensive-rules.pdf" target="_blank" rel="noopener noreferrer">
                Rulebook
            </a>

            <select id="model" title="Choose the underlying model">
                <option value="claude-sonnet-4-6">Sonnet 4.6 &middot; Fast</option>
                <option value="claude-opus-4-7">Opus 4.7 &middot; Max</option>
            </select>
        </header>

        <div id="chat">
            <div class="wrap" id="messages">
                <div class="empty" id="empty">
                    <h2>Ask a Magic: The Gathering rules question.</h2>
                    <p>Answers are grounded in the official Magic: The Gathering Rulebook.</p>

                    <div class="examples">
                        <button>If I cast Lightning Bolt at a creature, can my opponent respond?</button>
                        <button>How do first strike and deathtouch interact in combat?</button>
                        <button>Explain the layer system for continuous effects.</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="wrap">
                <div class="inputrow">
                    <textarea id="input" rows="1"
                    placeholder="Ask a rules question…"></textarea>
                    <button class="send" id="send">Fact or Fiction</button>
                </div>
            </div>
        </footer>

        <script>
            const history = []; // full conversation sent each turn
            const messagesEl = document.getElementById("messages");
            const emptyEl = document.getElementById("empty");
            const inputEl = document.getElementById("input");
            const sendEl = document.getElementById("send");
            const modelEl = document.getElementById("model");

            function escapeHtml(s) {
                return s.replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c]));
            }

            // Minimal, safe rendering: escape first, then add bold/code/rule highlights.
            function render(text) {
                let h = escapeHtml(text);
                h = h.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
                h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
                h = h.replace(/\(?\b(\d{3}\.\d+[a-z]?)\)?/g, '<span class="rule">$1</span>');
                return h;
            }

            function addMessage(role, text, sources) {
                if (emptyEl) emptyEl.remove();

                const msg = document.createElement("div");
                msg.className = "msg " + (role === "user" ? "user" : "bot");
                const bubble = document.createElement("div");
                bubble.className = "bubble";
                bubble.innerHTML = role === "user" ? escapeHtml(text) : render(text);

                if (sources && sources.length) {
                    const det = document.createElement("details");
                    det.className = "sources";
                    det.innerHTML = "<summary>Rule sources (" + sources.length + ")</summary>";
                    sources.forEach(s => {
                        const c = document.createElement("span");
                        c.className = "chip";
                        c.innerHTML = "<b>" + escapeHtml(s.rule) + "</b> — " +
                                        escapeHtml(s.preview) + "…";
                        det.appendChild(c);
                    });

                    bubble.appendChild(det);
                }

                msg.appendChild(bubble);
                messagesEl.appendChild(msg);
                msg.scrollIntoView({ behavior: "smooth", block: "end" });

                return bubble;
            }

            async function send() {
                const text = inputEl.value.trim();

                if (!text) return;

                inputEl.value = ""; inputEl.style.height = "auto";
                sendEl.disabled = true;

                addMessage("user", text);
                history.push({ role: "user", content: text });

                const thinking = addMessage("bot", "");
                thinking.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';

                try {
                    const res = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ messages: history, model: modelEl.value }),
                    });

                    const data = await res.json();
                    thinking.innerHTML = render(data.answer || "(no answer)");

                    if (data.sources && data.sources.length) {
                        const det = document.createElement("details");
                        det.className = "sources";
                        det.innerHTML = "<summary>Rule sources (" + data.sources.length + ")</summary>";

                        data.sources.forEach(s => {
                            const c = document.createElement("span");
                            c.className = "chip";
                            c.innerHTML = "<b>" + escapeHtml(s.rule) + "</b> — " + escapeHtml(s.preview) + "…";
                            det.appendChild(c);
                        });

                        thinking.appendChild(det);
                    }

                    history.push({ role: "assistant", content: data.answer || "" });
                } catch (e) {
                    thinking.innerHTML = "Error reaching the server. Is it running?";
                } finally {
                    sendEl.disabled = false;
                    inputEl.focus();
                }
            }

            sendEl.onclick = send;
            inputEl.addEventListener("keydown", e => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault(); send();
                }
            });

            inputEl.addEventListener("input", () => {
                inputEl.style.height = "auto";
                inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
            });

            document.querySelectorAll(".examples button").forEach(b => {
                b.onclick = () => { inputEl.value = b.textContent; send(); };
            });
        </script>
    </body>
</html>
